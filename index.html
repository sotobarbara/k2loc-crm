<head>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

            --primary: #0A1F4B;
            --accent: #E85D1A;
        }
        .header-gradient { background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%); }
        .logo-container { height: 50px; display: flex; align-items: center; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    
    <script>

        const e = React.createElement;

        // Firebase Config

        let db = null;
        try {

        } catch (err) {

        }

        // Dados dos 42 prospects

            { rank: 12, name: "IRION ENGENHARIA", phone: "(85) 9636-1258", email: "contato@irion.com.br", priority: "alta" },
            { rank: 13, name: "KLC CONSTRUCOES", phone: "(88) 3409-0117", email: "contato@klc.com.br", priority: "alta" },
            { rank: 14, name: "CARRILHO DESENVOLVIMENTO", phone: "(85) 8939-0678", email: "contato@carrilho.com.br", priority: "alta" },
            { rank: 15, name: "MAGALHAES DEMOLICAO", phone: "(85) 8902-3318", email: "contato@magalhaes.com.br", priority: "alta" },
            { rank: 16, name: "NOVUM GRUPO", phone: "(85) 3266-1100", email: "contato@novum.com.br", priority: "alta" },
            { rank: 17, name: "SHEKINAH CONSTRUCOES", phone: "(85) 9997-0599", email: "contato@shekinah.com.br", priority: "alta" },
            { rank: 18, name: "TERPLAN LOCACAO", phone: "(85) 9985-7797", email: "contato@terplan.com.br", priority: "alta" },
            { rank: 19, name: "TUMI CONSTRUCOES", phone: "(11) 3815-1760", email: "contato@tumi.com.br", priority: "alta" },
            { rank: 20, name: "BRIMAX ENGENHARIA", phone: "(84) 3062-4922", email: "contato@brimax.com.br", priority: "alta" },
            { rank: 21, name: "CONSORCIO GTM-BRIMAX", phone: "(85) 9163-5260", email: "contato@gtm.com.br", priority: "alta" },
            { rank: 22, name: "GTM ENGENHARIA", phone: "(88) 9437-2810", email: "contato@gtmeng.com.br", priority: "alta" },
            { rank: 23, name: "COSAMPA", phone: "(85) 3289-2363", email: "contato@cosampa.com.br", priority: "media" },
            { rank: 24, name: "COSTA & NOBREGA", phone: "(85) 9910-2626", email: "contato@costa.com.br", priority: "media" },
            { rank: 25, name: "BRASTERRA", phone: "(85) 3055-9708", email: "contato@brasterra.com.br", priority: "media" },
            { rank: 26, name: "BRISAS DO NASCENTE", phone: "(85) 8736-3625", email: "contato@brisas.com.br", priority: "media" },
            { rank: 27, name: "CDG ENGENHARIA", phone: "(85) 3239-1253", email: "contato@cdg.com.br", priority: "media" },
            { rank: 28, name: "CGL CONSTRUTORA", phone: "(85) 3013-8666", email: "contato@cgl.com.br", priority: "media" },
            { rank: 29, name: "CONSDUCTO ENGENHARIA", phone: "(85) 3067-1240", email: "contato@consducto.com.br", priority: "media" },
            { rank: 30, name: "CR DUARTE ENGENHARIA", phone: "(85) 3038-2024", email: "contato@crduarte.com.br", priority: "media" },
            { rank: 31, name: "CRA ENGENHARIA", phone: "(85) 8846-1125", email: "contato@cra.com.br", priority: "media" },
            { rank: 32, name: "EDMIL CONSTRUCOES", phone: "(88) 3441-1297", email: "contato@edmil.com.br", priority: "media" },
            { rank: 33, name: "FIP ENGENHARIA", phone: "(85) 8141-0503", email: "contato@fip.com.br", priority: "media" },
            { rank: 34, name: "GENUS ENGENHARIA", phone: "(81) 3080-1344", email: "contato@genus.com.br", priority: "media" },
            { rank: 35, name: "GESIN", phone: "(85) 3244-3641", email: "contato@gesin.com.br", priority: "media" },
            { rank: 36, name: "HERA CONSTRUCOES", phone: "(85) 8829-9001", email: "contato@hera.com.br", priority: "media" },
            { rank: 37, name: "CONSTRUTORA HIDROS", phone: "(86) 2239-4480", email: "contato@hidros.com.br", priority: "media" },
            { rank: 38, name: "HUMANY ENGENHARIA", phone: "(85) 99179-1500", email: "contato@humany.com.br", priority: "media" },
            { rank: 39, name: "JVA PROJETOS", phone: "(85) 3249-2023", email: "contato@jva.com.br", priority: "media" },
            { rank: 40, name: "LCM CONSTRUCAO", phone: "(31) 3298-7050", email: "contato@lcm.com.br", priority: "media" },
            { rank: 41, name: "LYRA MOREIRA", phone: "(85) 3229-2222", email: "contato@lyra.com.br", priority: "media" },
            { rank: 42, name: "M ENGENHARIA", phone: "(85) 9723-4352", email: "contato@mengenharia.com.br", priority: "media" }
        ];

        const STATUS_OPTIONS = [
            { key: "novo", label: "Novo", icon: "🔵" },
            { key: "contatado", label: "Contatado", icon: "🟡" },
            { key: "interessado", label: "Interessado", icon: "🟢" },
            { key: "agendado", label: "Agendado", icon: "📅" },
            { key: "cliente", label: "Cliente", icon: "⭐" },
            { key: "descartado", label: "Descartado", icon: "⛔" }
        ];

        const USERS = ["Fernanda", "Elizimario"];

        // Main App
        function App() {
            const [prospects, setProspects] = useState({});
            const [loaded, setLoaded] = useState(false);
            const [user, setUser] = useState(() => localStorage.getItem("k2loc-user") || "Fernanda");
            const [search, setSearch] = useState("");
            const [statusFilter, setStatusFilter] = useState("all");
            const [tab, setTab] = useState("crm");
            const [dialog, setDialog] = useState(null);
            const [notes, setNotes] = useState("");

            useEffect(() => {
                localStorage.setItem("k2loc-user", user);
            }, [user]);

            useEffect(() => {
                if (!db) {
                    const local = JSON.parse(localStorage.getItem("k2loc-prospects") || "{}");
                    if (!Object.keys(local).length) {
                        const init = {};
                        PROSPECTS_DATA.forEach(p => {
                            init[`p${String(p.rank).padStart(3, '0')}`] = {
                                ...p,
                                id: `p${String(p.rank).padStart(3, '0')}`,
                                status: "novo",
                                history: [],
                                updatedAt: Date.now()
                            };
                        });
                        localStorage.setItem("k2loc-prospects", JSON.stringify(init));
                        setProspects(init);
                    } else {
                        setProspects(local);
                    }
                    setLoaded(true);
                    return;
                }

                const ref = firebase.database.ref(db, "/prospects");
                const unsub = firebase.database.onValue(ref, (snap) => {
                    const val = snap.val();
                    if (!val) {
                        const init = {};
                        PROSPECTS_DATA.forEach(p => {
                            init[`p${String(p.rank).padStart(3, '0')}`] = {
                                ...p,
                                id: `p${String(p.rank).padStart(3, '0')}`,
                                status: "novo",
                                history: [],
                                updatedAt: Date.now()
                            };
                        });
                        firebase.database.set(ref, init);
                        setProspects(init);
                    } else {
                        setProspects(val);
                    }
                    setLoaded(true);
                });
                return unsub;
            }, []);

            const saveProspect = async (prospectId, newStatus) => {
                const p = prospects[prospectId];
                if (!p) return;

                const entry = {
                    timestamp: Date.now(),
                    user,
                    status: newStatus,
                    notes: notes.trim()
                };

                const history = [...(p.history || []), entry];
                const patch = { status: newStatus, history, updatedAt: entry.timestamp };

                if (db) {
                    await firebase.database.update(firebase.database.ref(db, `/prospects/${prospectId}`), patch);
                } else {
                    const updated = { ...prospects };
                    updated[prospectId] = { ...p, ...patch };
                    setProspects(updated);
                    localStorage.setItem("k2loc-prospects", JSON.stringify(updated));
                }

                setDialog(null);
                setNotes("");
            };

            const stats = useMemo(() => {
                const all = Object.values(prospects);
                return {
                    total: all.length,
                    contatados: all.filter(p => p.status !== "novo").length,
                    clientes: all.filter(p => p.status === "cliente").length,
                    taxa: all.length ? Math.round((all.filter(p => p.status === "cliente").length / all.length) * 100) : 0
                };
            }, [prospects]);

            const list = useMemo(() => {
                const arr = Object.values(prospects).sort((a, b) => a.rank - b.rank);
                const q = search.toLowerCase();
                return arr.filter(p => {
                    if (statusFilter !== "all" && p.status !== statusFilter) return false;
                    return !q || p.name.toLowerCase().includes(q) || p.phone.includes(q);
                });
            }, [prospects, search, statusFilter]);

            return e('div', { className: 'min-h-screen bg-gray-50' },
                // Header
                e('header', { className: 'header-gradient text-white shadow-lg sticky top-0 z-40' },
                    e('div', { className: 'max-w-7xl mx-auto px-4 py-3' },
                        e('div', { className: 'flex items-center justify-between gap-4' },
                            e('div', { className: 'flex items-center gap-3 flex-1' },
                                e('div', { className: 'logo-container' },
                                    e('svg', { 
                                        width: '45', 
                                        height: '45', 
                                        viewBox: '0 0 640 640',
                                        xmlns: 'http://www.w3.org/2000/svg'
                                    },
                                        e('g', null,
                                            e('path', { d: 'M258.4,384h-86c0,6.7,0,13.4,0,20,29,0,58,0,87,0v12h-100c0-15,0-30,0-44.9,28.8,0,57.6,0,86.5,0,.2-13.7.4-27.4.6-41.1-29,0-58.1,0-87.1,0v-13.9h100.2v4.4s-1.1,63.5-1.1,63.5Z', fill: '#E85D1A' }),
                                            e('path', { d: 'M346.1,95l-180.1,49.4v84.6l180.1,76.1,34.2-10.7,93.6-33V127.8l-127.8-32.9ZM467.8,256.7l-119.4,42c-1.7-.3-3.4-.7-5.1-1l-12.1-6,1.5-178.9-18.6,3.7-1.1,136.1-11.6-3.3V120c-.1,0-14.9,3.4-14.9,3.4l-1.4,122.4-8.8-3.2.5-116.9-12,3.2-1.4,110.7-7-2v-106.2l-10.5,2.2-1.1,101-5.5-1.5v-97.9l-8.8,1.8-.4,94.2-4.7-1.1-.3-91.7-7.8,2.3-.5,87.7-3.3-1.1-.4-85.9-6.4,1.8-.3,82-3.7-1v-80l-5.6,1.5-1.4,76.7-1.9-.4v-75.6l-5.6,1.4-.3,72.6-2.2-.8v-71.7l-5.1.9-.8,68.9-1.8-.3v-68.2l-4.1,1.1-.6,66.1-3.4-.4.6-67.8,175.3-47.4,122.1,31.9v124Z', fill: '#0A1F4B' })
                                        )
                                    )
                                ),
                                e('div', null,
                                    e('h1', { className: 'text-xl font-bold' }, 'K2LOC CRM'),
                                    e('p', { className: 'text-xs opacity-90' }, 'Fortaleza, CE')
                                )
                            ),
                            e('div', { className: 'flex items-center gap-3' },
                                e('select', {
                                    value: user,
                                    onChange: (ev) => setUser(ev.target.value),
                                    className: 'bg-white/20 text-white border border-white/30 rounded px-3 py-2 text-sm font-medium'
                                },
                                    USERS.map(u => e('option', { key: u, value: u }, u))
                                )
                            )
                        )
                    )
                ),

                // Main
                e('main', { className: 'max-w-7xl mx-auto px-4 py-6' },
                    // Stats
                    e('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-3 mb-6' },
                        [
                            { label: 'Total', value: stats.total, color: '#0A1F4B' },
                            { label: 'Contatados', value: stats.contatados, color: '#0A1F4B' },
                            { label: 'Clientes', value: stats.clientes, color: '#E85D1A' },
                            { label: 'Taxa', value: `${stats.taxa}%`, color: '#E85D1A' }
                        ].map(s => e('div', { key: s.label, className: 'bg-white rounded-lg p-4 shadow' },
                            e('p', { className: 'text-xs text-gray-500 uppercase tracking-wide' }, s.label),
                            e('p', { className: 'text-2xl font-bold mt-1', style: { color: s.color } }, s.value)
                        ))
                    ),

                    // Tabs
                    e('div', { className: 'bg-white rounded-lg shadow' },
                        e('div', { className: 'flex gap-2 border-b p-4 flex-wrap' },
                            ['crm', 'historico', 'analytics', 'exportar'].map(t =>
                                e('button', {
                                    key: t,
                                    onClick: () => setTab(t),
                                    className: `px-4 py-2 text-sm font-medium rounded transition ${ tab === t ? 'bg-orange-500 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`
                                }, {
                                    crm: '📋 CRM',
                                    historico: '📜 Histórico',
                                    analytics: '📊 Analytics',
                                    exportar: '⬇️ Exportar'
                                }[t])
                            )
                        ),

                        e('div', { className: 'p-6' },
                            // CRM Tab
                            tab === 'crm' && e('div', null,
                                e('div', { className: 'mb-4 flex flex-col sm:flex-row gap-2' },
                                    e('input', {
                                        type: 'text',
                                        placeholder: 'Buscar...',
                                        value: search,
                                        onChange: (ev) => setSearch(ev.target.value),
                                        className: 'flex-1 border rounded px-3 py-2 text-sm'
                                    }),
                                    e('select', {
                                        value: statusFilter,
                                        onChange: (ev) => setStatusFilter(ev.target.value),
                                        className: 'border rounded px-3 py-2 text-sm'
                                    },
                                        e('option', { value: 'all' }, 'Todos'),
                                        STATUS_OPTIONS.map(s => e('option', { key: s.key, value: s.key }, `${s.icon} ${s.label}`))
                                    )
                                ),
                                !loaded ? e('p', { className: 'text-center py-8 text-gray-500' }, 'Carregando...') :
                                    e('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4' },
                                        list.map(p => {
                                            const status = STATUS_OPTIONS.find(s => s.key === p.status);
                                            const recent = (p.history || []).slice(-3).reverse();
                                            return e('div', { key: p.id, className: 'bg-gray-50 border rounded-lg p-4' },
                                                e('div', { className: 'flex justify-between items-start mb-2' },
                                                    e('div', null,
                                                        e('p', { className: 'text-xs text-gray-500 font-mono' }, `#${p.rank}`),
                                                        e('p', { className: 'font-semibold text-sm text-gray-900 truncate' }, p.name)
                                                    ),
                                                    e('span', { className: 'text-xs bg-white px-2 py-1 rounded border' }, `${status.icon} ${status.label}`)
                                                ),
                                                e('p', { className: 'text-xs text-gray-600 mb-3' }, p.phone),
                                                e('div', { className: 'flex gap-2 mb-3' },
                                                    e('a', { href: `tel:${p.phone}`, className: 'flex-1 bg-blue-500 text-white text-xs font-medium py-1 px-2 rounded text-center' }, '📞'),
                                                    e('select', {
                                                        value: p.status,
                                                        onChange: (ev) => setDialog({ prospectId: p.id, newStatus: ev.target.value }),
                                                        className: 'flex-1 text-xs border rounded px-2 py-1'
                                                    },
                                                        STATUS_OPTIONS.map(s => e('option', { key: s.key, value: s.key }, s.label))
                                                    )
                                                ),
                                                recent.length > 0 && e('div', { className: 'border-t pt-2 text-xs text-gray-600' },
                                                    recent.map((h, i) => e('p', { key: i, className: 'mb-1' }, `👤 ${h.user} → ${h.status} ${new Date(h.timestamp).toLocaleDateString('pt-BR')}`))
                                                )
                                            );
                                        })
                                    )
                            ),

                            // Histórico Tab
                            tab === 'historico' && e('div', null,
                                Object.values(prospects).flatMap(p => (p.history || []).map(h => ({ ...h, prospect: p.name }))).sort((a, b) => b.timestamp - a.timestamp).slice(0, 20).map((h, i) =>
                                    e('div', { key: i, className: 'bg-gray-50 border rounded p-3 mb-2 text-sm' },
                                        e('p', { className: 'font-semibold text-gray-900' }, h.prospect),
                                        e('p', { className: 'text-xs text-gray-600' }, `${h.user} · ${STATUS_OPTIONS.find(s => s.key === h.status).icon} ${h.status} · ${new Date(h.timestamp).toLocaleDateString('pt-BR')} ${new Date(h.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`),
                                        h.notes && e('p', { className: 'text-xs italic text-gray-700 mt-1' }, `"${h.notes}"`)
                                    )
                                )
                            ),

                            // Analytics Tab
                            tab === 'analytics' && e('div', null,
                                e('p', { className: 'text-sm text-gray-600 mb-4' }, `Status: ${stats.contatados} contatados, ${stats.clientes} clientes, ${stats.taxa}% conversão`)
                            ),

                            // Exportar Tab
                            tab === 'exportar' && e('div', null,
                                e('button', {
                                    onClick: () => {
                                        const blob = new Blob([JSON.stringify(prospects, null, 2)], { type: 'application/json' });
                                        const url = URL.createObjectURL(blob);
                                        const a = document.createElement('a');
                                        a.href = url;
                                        a.download = `k2loc-crm-${new Date().toISOString().slice(0, 10)}.json`;
                                        a.click();
                                    },
                                    className: 'bg-orange-500 text-white px-4 py-2 rounded text-sm font-medium'
                                }, '⬇️ Exportar JSON')
                            )
                        )
                    )
                ),

                // Dialog
                dialog && e('div', { className: 'fixed inset-0 bg-black/50 flex items-center justify-center z-50' },
                    e('div', { className: 'bg-white rounded-lg p-6 max-w-md w-full' },
                        e('h3', { className: 'text-lg font-semibold mb-4' }, `Confirmar: ${dialog.newStatus}`),
                        e('textarea', {
                            value: notes,
                            onChange: (ev) => setNotes(ev.target.value),
                            placeholder: 'Notas (opcional)',
                            className: 'w-full border rounded px-3 py-2 text-sm mb-4 h-20',
                            maxLength: 500
                        }),
                        e('p', { className: 'text-xs text-gray-600 mb-4' }, `Registrando como: ${user}`),
                        e('div', { className: 'flex gap-2' },
                            e('button', {
                                onClick: () => setDialog(null),
                                className: 'flex-1 border rounded px-3 py-2 text-sm font-medium'
                            }, 'Cancelar'),
                            e('button', {
                                onClick: () => saveProspect(dialog.prospectId, dialog.newStatus),
                                className: 'flex-1 bg-green-500 text-white rounded px-3 py-2 text-sm font-medium'
                            }, 'Salvar')
                        )
                    )
                )
            );
        }

        ReactDOM.render(e(App), document.getElementById('root'));
    </script>
</body>
</html>
