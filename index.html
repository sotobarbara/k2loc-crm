const haversine = (a, b) => {
  const R = 6371,
    toR = x => x * Math.PI / 180;
  const dLat = toR(b.lat - a.lat),
    dLng = toR(b.lng - a.lng);
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(toR(a.lat)) * Math.cos(toR(b.lat)) * Math.sin(dLng / 2) ** 2;
  return Math.round(2 * R * Math.asin(Math.min(1, Math.sqrt(h))));
};

  if (lead.lat && lead.lng) return {
    lat: lead.lat,
    lng: lead.lng,
    approx: false
  };
  const c = DDD_CITY[dddOf(lead.phone)];
  if (c) return {
    lat: c.lat,
    lng: c.lng,
    approx: true,
    city: c.c + '/' + c.uf
  };
  return null;
};

};
// Geocodifica um endereço (OpenStreetMap Nominatim) — melhor esforço, roda no navegador
async function geocode(address, hint) {
  if (typeof fetch !== 'function' || !address) return null;
  const q = encodeURIComponent(address + (hint ? ', ' + hint : '') + ', Brasil');
  const res = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + q, {
    headers: {
      'Accept': 'application/json'
    }
  });
  const data = await res.json();
  if (data && data[0]) return {
    lat: parseFloat(data[0].lat),
    lng: parseFloat(data[0].lon)
  };
  return null;
}
